name: Publish executor image

on:
  push:
    branches: [master]
    paths:
      - Dockerfile
      - executor.py
      - .github/workflows/publish-executor-image.yml
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image owner
        # Docker exige des tags en minuscules ; github.repository_owner
        # garde la casse GitHub ("ZeWills987").
        id: owner
        run: echo "lower=${OWNER,,}" >> "$GITHUB_OUTPUT"
        env:
          OWNER: ${{ github.repository_owner }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.lower }}/gpuoffload-executor:latest
            ghcr.io/${{ steps.owner.outputs.lower }}/gpuoffload-executor:${{ github.sha }}
